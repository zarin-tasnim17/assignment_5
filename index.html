<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div id="login_view">
        <div class="login_card">
            <img src="./assets/github-logo.png">
        
            <h2>GitHub Issues Tracker</h2>
            <p>Sign in to manage your issues</p>
            
            <div id="login_error" class="hidden">Invalid credentials. Try again.</div>
            
            <form id="login_form">
                <div class="form_group">
                    <label>Username</label>
                    <input type="text" id="username" placeholder="Enter Username" required>
                    <span class="hint">Default: admin</span>
                </div>
                <div class="form_group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Enter Password" required>
                    <span class="hint">Default: admin123</span>
                </div>
                <button type="submit" class="btn_primary">Sign In</button>
            </form>

            <div class="demo_credentials">
                <strong>Demo Credentials:</strong><br>
                Username: admin<br>
                Password: admin123
            </div>
        </div>
    </div>
    <script src="./script.js"></script>
</body>
</html>
